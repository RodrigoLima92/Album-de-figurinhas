<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maker Labs São Roque - Sistema de Gestão</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        :root {
            --bg-body: #121214;
            --bg-decoration: radial-gradient(#1f1f23 20%, transparent 20%), radial-gradient(#1f1f23 20%, transparent 20%);
            --bg-size: 20px 20px;
            --bg-box: #1e1e22;
            --border-color: #2e2e34;
            --text-color: #e1e1e6;
            --accent-color: #00b4d8;
            --accent-gradient: linear-gradient(135deg, #0077b6, #00b4d8);
            --header-bg: linear-gradient(135deg, #00b4d8, #0077b6);
            --footer-bg: #1f1f23;
            --card-shadow: rgba(0,0,0,0.5);
            --page-bg: #1a1a1e;
        }

        body { 
            background-color: var(--bg-body); color: var(--text-color); padding: 20px 20px 80px 20px; 
            background-image: var(--bg-decoration); background-size: var(--bg-size); background-repeat: repeat; background-attachment: fixed;
            position: relative; min-height: 100vh; transition: all 0.3s ease;
        }

        header { 
            display: flex; justify-content: space-between; align-items: center; max-width: 1300px; margin: 0 auto 30px auto; padding: 20px 25px; 
            background-image: linear-gradient(135deg, #00b4d8, #0077b6); background-size: cover; background-position: center;
            border-radius: 16px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4); border: 1px solid var(--border-color);
        }
        header h1 { font-size: 1.6rem; text-transform: uppercase; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.6); }
        header p { color: #ffffff; font-size: 0.95rem; text-shadow: 1px 1px 4px rgba(0,0,0,0.6); background: rgba(0,0,0,0.25); padding: 6px 12px; border-radius: 8px; display: inline-block; }

        .coin-display { background: #ffb703; color: #121214; font-weight: bold; padding: 6px 14px; border-radius: 20px; display: inline-flex; align-items: center; gap: 6px; box-shadow: 0 4px 10px rgba(255,183,3,0.3); font-size: 0.95rem; text-shadow: none; margin-left: 8px; }

        footer {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; padding: 0 25px;
            display: flex; align-items: center; justify-content: center;
            background: #121214; border-top: 1px solid var(--border-color);
            z-index: 900; color: #7c7c8a; font-size: 0.85rem;
        }

        .screen { display: none; position: relative; z-index: 10; }
        .screen.active { display: block; }

        .login-container { max-width: 400px; margin: 80px auto; background: var(--bg-box); padding: 35px; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); text-align: center; border: 1px solid var(--border-color); }
        .login-container h1 { font-size: 2rem; color: var(--accent-color); margin-bottom: 5px; }
        .login-container h2 { font-size: 1.1rem; color: #a8a8b3; margin-bottom: 25px; }

        input, select, textarea { width: 100%; padding: 11px 14px; margin-bottom: 12px; border: 1px solid var(--border-color); background: #141416; color: #fff; border-radius: 8px; font-size: 0.95rem; transition: border 0.2s; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent-color); outline: none; background: #161619; }
        label { display: block; text-align: left; margin-bottom: 6px; font-size: 0.8rem; color: #a8a8b3; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        
        button { width: 100%; padding: 12px; background: var(--accent-gradient); color: white; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: bold; cursor: pointer; transition: background 0.2s, transform 0.1s; }
        button:hover { filter: brightness(1.1); }
        button:active { transform: scale(0.99); }
        button:disabled { background: #29292e !important; color: #7c7c7a !important; cursor: not-allowed; transform: none !important; filter: none; }
        
        .btn-danger { background: linear-gradient(135deg, #e63946, #ff4d6d); }
        .btn-secondary { background: #29292e; color: #e1e1e6; border: 1px solid var(--border-color); }
        .btn-secondary:hover { background: #323238; }
        .btn-edit { background: linear-gradient(135deg, #f4a261, #e76f51); padding: 4px 10px; font-size: 0.75rem; border-radius: 6px; width: auto; }
        .btn-coin { background: linear-gradient(135deg, #ffb703, #fb8500); color: #121214; }

        .filter-group-inline { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; background: #141416; padding: 8px; border-radius: 8px; border: 1px solid var(--border-color); align-items: center; }
        .filter-field { flex: 1; min-width: 120px; }
        .filter-field input, .filter-field select { margin-bottom: 0; padding: 8px 12px; font-size: 0.85rem; height: 36px; }

        /* --- ESTANTE DE LIVROS --- */
        .bookcase-container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .shelf {
            background: linear-gradient(transparent 90%, #5c3d2e 90%, #3d251a 100%);
            padding: 30px 20px 25px 20px; margin-bottom: 50px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 30px;
            border-bottom: 12px solid #2b1810;
        }
        
        .book-cover-item {
            width: 170px; height: 240px; border-radius: 4px 12px 12px 4px; padding: 15px;
            display: flex; flex-direction: column; justify-content: space-between; align-items: center; cursor: pointer; position: relative;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5), inset 8px 0 8px rgba(0,0,0,0.3); border-left: 6px solid rgba(0,0,0,0.4);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); justify-self: center; text-align: center;
        }
        .book-cover-item:hover { transform: translateY(-15px) scale(1.05); box-shadow: 10px 15px 25px rgba(0,0,0,0.7); }
        .book-cover-title { font-size: 1rem; font-weight: bold; color: #fff; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); text-transform: uppercase; line-height: 1.2; width: 100%; word-wrap: break-word; }
        .book-cover-badge { background: rgba(0,0,0,0.6); color: #ffb703; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; text-align: center; width: 100%; }
        
        .book-cover-thumb { width: 100%; height: 90px; margin: 10px 0; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 6px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); }
        .book-cover-img { width: 100%; height: 100%; object-fit: cover; }

        /* --- DESIGN DO LIVRO ABERTO --- */
        .album-stats { background: var(--bg-box); padding: 15px 25px; border-radius: 15px; margin-bottom: 25px; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px; max-width: 1050px; margin: 0 auto 25px auto; }
        .stats-row { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .progress-bar-bg { background: var(--bg-body); width: 50%; height: 16px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border-color); }
        .progress-bar-fill { background: linear-gradient(90deg, #ffb703, #2a9d8f); height: 100%; width: 0%; transition: width 0.5s ease; }
        .stats-text { font-weight: bold; color: #ffb703; font-size: 1.1rem; }

        .book-container { max-width: 1050px; margin: 0 auto 30px auto; background: #0f0f11; padding: 20px; border-radius: 24px; box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.6); border: 4px solid #2d2d30; }
        .book-wrapper { display: grid; grid-template-columns: 1fr 1fr; background: var(--page-bg); border-radius: 12px; position: relative; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.3); border: 1px solid #3c3c42; }
        .book-wrapper::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 100%; background: linear-gradient(to right, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 40%, rgba(0,0,0,0) 60%, rgba(0,0,0,0.4) 100%); z-index: 50; pointer-events: none; }
        
        .book-page { padding: 30px 25px 40px 25px; height: 560px; display: flex; flex-direction: column; position: relative; justify-content: center; }
        .book-page.left-page { border-right: 1px solid rgba(0,0,0,0.3); }
        .book-page.right-page { border-left: 1px solid rgba(0,0,0,0.3); }
        .page-num { position: absolute; bottom: 12px; font-size: 0.85rem; color: #7c7c7a; font-weight: bold; }
        .left-page .page-num { left: 20px; }
        .right-page .page-num { right: 20px; }
        
        .page-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            grid-template-rows: repeat(2, 1fr);
            gap: 20px; 
            width: 100%;
            height: 100%;
            max-width: 440px;
            margin: 0 auto;
            align-items: center;
            justify-content: center;
        }
        
        .book-controls { display: flex; justify-content: space-between; max-width: 1050px; margin: 0 auto; gap: 20px; }
        .book-controls button { width: auto; flex: 1; padding: 15px; }

        /* --- CARDS / FIGURINHAS --- */
        .card { 
            background: var(--bg-box); border-radius: 14px; padding: 10px; 
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            text-align: center; border: 4px solid var(--border-color); box-shadow: 0 6px 12px var(--card-shadow); 
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.3s; position: relative; cursor: pointer; overflow: hidden;
            width: 100%; height: 100%; max-height: 235px; margin: 0 auto;
        }
        .card:hover { transform: scale(1.03); z-index: 60; }

        .card::after {
            content: ''; position: absolute; top: -50%; left: -60%; width: 30%; height: 200%;
            transform: rotate(25deg); transition: none; pointer-events: none;
            animation: passing-shine 8s infinite ease-in-out;
        }

        .card.comum::after { display: none; content: none; }
        .card.comum { border-color: #55555e; animation: none !important; box-shadow: 0 6px 12px var(--card-shadow) !important; }
        .card.rara::after { background: linear-gradient(to right, rgba(0,180,216,0) 0%, rgba(0,180,216,0.25) 50%, rgba(0,180,216,0) 100%); animation-duration: 7s; }
        .card.rara { border-color: #00b4d8; }
        .card.epica::after { background: linear-gradient(to right, rgba(157,78,221,0) 0%, rgba(216,180,254,0.35) 50%, rgba(157,78,221,0) 100%); animation-duration: 5.5s; }
        .card.epica { border-color: #9d4edd; }
        .card.lendaria::after { background: linear-gradient(to right, rgba(255,183,3,0) 0%, rgba(255,255,255,0.4) 40%, rgba(255,183,3,0.4) 60%, rgba(255,183,3,0) 100%); animation-duration: 4.5s; }
        .card.lendaria { border-color: #ffb703; }

        @keyframes passing-shine { 0% { left: -70%; } 15% { left: 120%; } 100% { left: 120%; } }

        .zoom-container .card.rara { animation: glow-rara 4s infinite alternate ease-in-out; }
        .zoom-container .card.epica { animation: glow-epica 3.5s infinite alternate ease-in-out; }
        .zoom-container .card.lendaria { animation: glow-lendaria 3s infinite alternate ease-in-out; }

        @keyframes glow-rara { 0% { box-shadow: 0 0 6px rgba(0, 180, 216, 0.4); } 100% { box-shadow: 0 0 18px rgba(0, 180, 216, 0.8); } }
        @keyframes glow-epica { 0% { box-shadow: 0 0 8px rgba(157, 78, 221, 0.5); } 100% { box-shadow: 0 0 26px rgba(157, 78, 221, 0.9); } }
        @keyframes glow-lendaria { 0% { box-shadow: 0 0 12px rgba(255, 183, 3, 0.6); border-color: #ffb703; } 100% { box-shadow: 0 0 38px rgba(255, 183, 3, 1), 0 0 10px rgba(255,255,255,0.2) inset; border-color: #fff; } }

        .badge-nova { position: absolute; top: 8px; right: 8px; background: #e63946; color: #fff; font-size: 0.65rem; font-weight: bold; padding: 3px 8px; border-radius: 8px; box-shadow: 0 0 10px rgba(230,57,70,0.8); z-index: 80; text-transform: uppercase; animation: pulse-badge 1.2s infinite alternate; pointer-events: none; }
        @keyframes pulse-badge { 0% { transform: scale(0.95); opacity: 0.8; } 100% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 14px rgba(230,57,70,1); } }

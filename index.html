<script type="module">
        // 1. Importações dos SDKs do Firebase (Versão Web Modular)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Sua configuração do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBzlVayf42IU6IExTLiZosRB0O1OHQ4wik",
            authDomain: "album-27bb2.firebaseapp.com",
            projectId: "album-27bb2",
            storageBucket: "album-27bb2.firebasestorage.app",
            messagingSenderId: "380185061798",
            appId: "1:380185061798:web:a41721fc9cda26b3f18767",
            databaseURL: "https://album-27bb2-default-rtdb.firebaseio.com" // Ajuste se sua URL do Realtime Database for diferente
        };

        // Inicializa o Firebase e o Banco de Dados
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ==========================================
        // 2. ESTADO DA APLICAÇÃO
        // ==========================================
        let albuns = [];
        let cartas = [];
        let usuarios = [];
        let inventario = {};

        let usuarioLogado = null;
        let albumAtivo = null;
        let paginaAtualEsquerda = 1;

        // ==========================================
        // 3. SINCRONIZAÇÃO EM TEMPO REAL COM FIREBASE
        // ==========================================
        
        // Escuta mudanças nos Álbuns
        onValue(ref(db, 'albuns'), (snapshot) => {
            const data = snapshot.val();
            albuns = data ? Object.values(data) : [];
            if (document.getElementById("screen-admin").classList.contains("active")) {
                atualizarSelectsDeAlbuns();
                listarAlbunsAdmin();
            }
        });

        // Escuta mudanças nas Figurinhas
        onValue(ref(db, 'cartas'), (snapshot) => {
            const data = snapshot.val();
            cartas = data ? Object.values(data) : [];
            if (document.getElementById("screen-admin").classList.contains("active")) {
                listarCartasCadastradasAdmin();
                atualizarSelectisFigurinhasDistribuicao();
            }
            if (document.getElementById("screen-album").classList.contains("active")) {
                renderizarAlbumAberto();
            }
        });

        // Escuta mudanças nos Usuários
        onValue(ref(db, 'usuarios'), (snapshot) => {
            const data = snapshot.val();
            usuarios = data ? Object.values(data) : [];
            
            // Se o usuário atual estiver logado, atualiza os dados locais dele (como saldo de moedas)
            if (usuarioLogado) {
                const atualizado = usuarios.find(u => u.id === usuarioLogado.id);
                if (atualizado) usuarioLogado = atualizado;
            }
            
            if (document.getElementById("screen-admin").classList.contains("active")) {
                filtrarAlunosDistribuicao();
            }
        });

        // Escuta mudanças no Inventário de figurinhas coladas
        onValue(ref(db, 'inventario'), (snapshot) => {
            inventario = snapshot.val() || {};
            if (document.getElementById("screen-album").classList.contains("active")) {
                renderizarAlbumAberto();
            }
        });

        // Carga Inicial/Criador de Dados padrão caso o banco esteja completamente vazio
        async function verificarBancoVazio() {
            const snap = await get(ref(db, 'usuarios'));
            if (!snap.exists()) {
                // Massa de dados inicial se o banco estiver zerado
                await set(ref(db, 'albuns/alb-2026'), { id: "alb-2026", title: "Anual Maker 2026", image: "🤖", color: "#0077b6" });
                await set(ref(db, 'usuarios/u1'), { id: "u1", name: "Professor Admin", grade: "-", letter: "-", role: "administrador", pin: "1234", coins: 999 });
                await set(ref(db, 'usuarios/u4'), { id: "u4", name: "Aluno Maker", grade: "6º Ano", letter: "A", role: "aluno", pin: "1111", coins: 35 });
                await set(ref(db, 'cartas/c1'), { id: "c1", albumId: "alb-2026", name: "Impressora 3D", rarity: "comum", points: 10, price: 5, img: "", desc: "Funde plástico camada por camada." });
            }
        }
        verificarBancoVazio();

        // ==========================================
        // 4. AUTENTICAÇÃO E NAVEGAÇÃO
        // ==========================================
        window.fazerLogin = function() {
            const userIn = document.getElementById("username").value.trim();
            const passIn = document.getElementById("password").value;
            const roleIn = document.getElementById("login-role").value;

            const userFound = usuarios.find(u => 
                u.name.toLowerCase() === userIn.toLowerCase() && 
                u.pin === passIn && 
                u.role === roleIn
            );

            if (!userFound) {
                alert("❌ Credenciais incorretas ou cargo inválido!");
                return;
            }

            usuarioLogado = userFound;

            if (usuarioLogado.role === 'aluno') {
                mudarTela('screen-bookcase');
            } else {
                mudarTela('screen-admin');
            }
        };

        window.fazerLogout = function() {
            usuarioLogado = null;
            albumAtivo = null;
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
            mudarTela('screen-login');
        };

        function mudarTela(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            if (screenId === 'screen-bookcase') renderizarEstante();
            if (screenId === 'screen-admin') inicializarPainelAdmin();
        }
        window.mudarTela = mudarTela;

        // ==========================================
        // 5. INTERFACE DO ÁLBUM / ESTANTE
        // ==========================================
        function gerarMoedasHTML(quantidade) {
            return `<span class="coin-display">🪙 ${quantidade} MakerCoins</span>`;
        }

        function renderizarEstante() {
            if (!usuarioLogado) return;
            document.getElementById("shelf-user-display").innerText = usuarioLogado.name;
            document.getElementById("shelf-coins-wrapper").innerHTML = gerarMoedasHTML(usuarioLogado.coins);
            
            const btnBack = document.getElementById("btn-shelf-back-admin");
            btnBack.style.display = usuarioLogado.role !== 'aluno' ? "inline-block" : "none";

            const grid = document.getElementById("shelf-books-grid");
            grid.innerHTML = "";

            albuns.forEach(alb => {
                const totalCartasAlb = cartas.filter(c => c.albumId === alb.id).length;
                const totalObtidas = cartas.filter(c => c.albumId === alb.id && inventario[usuarioLogado.id]?.[c.id] > 0).length;

                const item = document.createElement("div");
                item.className = "book-cover-item";
                item.style.backgroundColor = alb.color;
                item.onclick = () => abrirAlbum(alb.id);

                const isEmoji = alb.image.length <= 4;
                const imgContent = isEmoji ? `<div style="font-size:3rem;">${alb.image}</div>` : `<img src="${alb.image}" class="book-cover-img" alt="Capa">`;

                item.innerHTML = `
                    <div class="book-cover-title">${alb.title}</div>
                    <div class="book-cover-thumb">${imgContent}</div>
                    <div class="book-cover-badge">📊 ${totalObtidas} / ${totalCartasAlb} Fig.</div>
                `;
                grid.appendChild(item);
            });
        }

        window.verEstanteComoAdmin = function() {
            mudarTela('screen-bookcase');
        };

        function abrirAlbum(albumId) {
            albumAtivo = albuns.find(a => a.id === albumId);
            paginaAtualEsquerda = 1;
            mudarTela('screen-album');
            renderizarAlbumAberto();
        }

        function renderizarAlbumAberto() {
            if (!albumAtivo || !usuarioLogado) return;

            document.getElementById("active-album-title").innerText = albumAtivo.title;
            document.getElementById("user-display").innerText = usuarioLogado.name;
            document.getElementById("album-coins-wrapper").innerHTML = gerarMoedasHTML(usuarioLogado.coins);

            const cartasDoAlbum = cartas.filter(c => c.albumId === albumAtivo.id);
            const totalDoAlbum = cartasDoAlbum.length;
            const totalObtidas = cartasDoAlbum.filter(c => inventario[usuarioLogado.id]?.[c.id] > 0).length;
            
            const porcentagem = totalDoAlbum > 0 ? Math.round((totalObtidas / totalDoAlbum) * 100) : 0;
            document.getElementById("album-progress-text").innerText = `Figurinhas: ${totalObtidas} / ${totalDoAlbum}`;
            document.getElementById("album-progress-bar").style.width = `${porcentagem}%`;
            document.getElementById("album-percentage-text").innerText = `${porcentagem}%`;

            document.getElementById("page-left-num").innerText = `Pág. ${paginaAtualEsquerda}`;
            document.getElementById("page-right-num").innerText = `Pág. ${paginaAtualEsquerda + 1}`;

            const indexInicialEsq = (paginaAtualEsquerda - 1) * 4;
            const indexInicialDir = indexInicialEsq + 4;

            renderizarGradePagina(document.getElementById("page-left-grid"), cartasDoAlbum, indexInicialEsq, indexInicialEsq + 4);
            renderizarGradePagina(document.getElementById("page-right-grid"), cartasDoAlbum, indexInicialDir, indexInicialDir + 4);

            document.getElementById("btn-book-prev").disabled = (paginaAtualEsquerda === 1);
            document.getElementById("btn-book-next").disabled = (indexInicialDir + 4 >= totalDoAlbum);
        }

        function renderizarGradePagina(container, listaCartas, inicio, fim) {
            container.innerHTML = "";
            for (let i = inicio; i < fim; i++) {
                const numSlot = i + 1;
                const carta = listaCartas[i];

                if (!carta) {
                    container.innerHTML += `<div class="card-slot-empty" style="opacity:0.2;"><div class="card-slot-number">${numSlot}</div></div>`;
                    continue;
                }

                const quantidadePossuida = inventario[usuarioLogado.id]?.[carta.id] || 0;

                if (quantidadePossuida > 0) {
                    const imgTag = carta.img ? `<img src="${carta.img}" class="card-img" alt="${carta.name}">` : `<span class="card-img-fallback">🚀</span>`;
                    const badgeRepetida = quantidadePossuida > 1 ? `<div class="badge-nova">+${quantidadePossuida - 1}</div>` : '';
                    
                    const cardHTML = `
                        <div class="card ${carta.rarity}" onclick="ampliarCarta('${carta.id}')">
                            ${badgeRepetida}
                            <span class="card-raridade">${carta.rarity}</span>
                            <div class="card-img-container">${imgTag}</div>
                            <div class="card-name">${carta.name}</div>
                            <div class="card-points">⚡ ${carta.points} pts</div>
                            <div class="card-habilidade">${carta.desc}</div>
                        </div>
                    `;
                    container.innerHTML += cardHTML;
                } else {
                    const precoHTML = carta.price > 0 ? `
                        <button class="buy-sticker-btn" onclick="comprarFigurinhaDireta(event, '${carta.id}')">
                            🪙 ${carta.price}
                        </button>
                    ` : '';
                    
                    container.innerHTML += `
                        <div class="card-slot-empty">
                            <div class="card-slot-number">${numSlot}</div>
                            <div style="font-size:0.75rem; text-align:center; padding:0 5px; color:#7c7c8a;">${carta.name}</div>
                            ${precoHTML}
                        </div>
                    `;
                }
            }
        }

        window.folhearPagina = function(direcao) {
            paginaAtualEsquerda += (direcao * 2);
            renderizarAlbumAberto();
        };

        window.comprarFigurinhaDireta = async function(event, cartaId) {
            event.stopPropagation();
            const carta = cartas.find(c => c.id === cartaId);
            if (!carta) return;

            if (usuarioLogado.coins < carta.price) {
                alert("❌ Você não tem MakerCoins suficientes!");
                return;
            }

            if (confirm(`Confirmar a compra de "${carta.name}" por 🪙 ${carta.price}?`)) {
                const novasMoedas = usuarioLogado.coins - carta.price;
                const novaQtd = (inventario[usuarioLogado.id]?.[cartaId] || 0) + 1;

                // Atualizações atômicas no Firebase
                await update(ref(db, `usuarios/${usuarioLogado.id}`), { coins: novasMoedas });
                await set(ref(db, `inventario/${usuarioLogado.id}/${cartaId}`), novaQtd);
                
                usuarioLogado.coins = novasMoedas;
                renderizarAlbumAberto();
            }
        };

        // ==========================================
        // 6. ZOOM / AMPLIAÇÃO
        // ==========================================
        window.ampliarCarta = function(cartaId) {
            const carta = cartas.find(c => c.id === cartaId);
            if (!carta) return;

            const imgTag = carta.img ? `<img src="${carta.img}" class="card-img" alt="${carta.name}">` : `<span class="card-img-fallback" style="font-size:5rem;">🚀</span>`;
            document.getElementById("zoom-card-content").innerHTML = `
                <div class="card ${carta.rarity}">
                    <span class="card-raridade" style="font-size:0.85rem; padding:4px 12px;">${carta.rarity}</span>
                    <div class="card-img-container">${imgTag}</div>
                    <div class="card-name">${carta.name}</div>
                    <div class="card-points">⚡ ${carta.points} Pontos de Experiência</div>
                    <div class="card-habilidade">${carta.desc}</div>
                </div>
            `;
            document.getElementById("zoom-modal").classList.add("active");
        };

        window.fecharAmpliacao = function(e) {
            if (e.target.id === "zoom-modal") document.getElementById("zoom-modal").classList.remove("active");
        };
        window.fecharAmpliacaoObg = function() {
            document.getElementById("zoom-modal").classList.remove("active");
        };

        // ==========================================
        // 7. PAINEL ADMINISTRATIVO E ENVIOS
        // ==========================================
        function inicializarPainelAdmin() {
            document.getElementById("admin-role-display").innerText = usuarioLogado.role;
            const r = usuarioLogado.role;
            
            configurarTravaComponente("box-gerenciar-albuns", (r === 'administrador' || r === 'instrutor'));
            configurarTravaComponente("box-gerenciar-cartas", (r === 'administrador' || r === 'instrutor'));
            configurarTravaComponente("box-gerenciar-alunos", (r === 'administrador'));
            configurarTravaComponente("box-distribuir-cartas", (r !== 'aluno'));

            atualizarSelectsDeAlbuns();
            listarAlbunsAdmin();
            listarCartasCadastradasAdmin();
            filtrarAlunosDistribuicao();
        }

        function configurarTravaComponente(id, condicao) {
            const el = document.getElementById(id);
            if (condicao) el.classList.remove("disabled-box"); else el.classList.add("disabled-box");
        }

        function atualizarSelectsDeAlbuns() {
            const opcoes = albuns.map(a => `<option value="${a.id}">${a.title}</option>`).join("");
            document.getElementById("card-album-select").innerHTML = opcoes;
            document.getElementById("filter-cards-by-album").innerHTML = `<option value="todos">-- Ver Todas --</option>` + opcoes;
            document.getElementById("select-dist-album-filter").innerHTML = opcoes;
        }

        function listarAlbunsAdmin() {
            const list = document.getElementById("list-albuns-ativos");
            list.innerHTML = albuns.map(a => `
                <div class="list-item">
                    <span>${a.image} <b>${a.title}</b></span>
                    <div class="box-acoes-botoes">
                        <button class="btn-edit" onclick="carregarAlbumParaEdicao('${a.id}')">✏️</button>
                        <button class="btn-danger" style="padding:4px 8px; font-size:0.75rem;" onclick="removerAlbum('${a.id}')">❌</button>
                    </div>
                </div>
            `).join("");
        }

        window.salvarNovoAlbum = async function() {
            const title = document.getElementById("album-new-title").value.trim();
            const img = document.getElementById("album-new-image").value.trim() || "📁";
            const color = document.getElementById("album-new-color").value;
            const editId = document.getElementById("album-edit-id").value;

            if (!title) return alert("Informe o título!");

            const id = editId || "alb-" + Date.now();
            await set(ref(db, `albuns/${id}`), { id, title, image: img, color });

            document.getElementById("album-edit-id").value = "";
            document.getElementById("album-new-title").value = "";
            document.getElementById("album-new-image").value = "";
            document.getElementById("title-album-form").innerText = "📁 Gerenciar / Criar Álbuns";
        };

        window.carregarAlbumParaEdicao = function(id) {
            const alb = albuns.find(a => a.id === id);
            if (!alb) return;
            document.getElementById("album-edit-id").value = alb.id;
            document.getElementById("album-new-title").value = alb.title;
            document.getElementById("album-new-image").value = alb.image;
            document.getElementById("album-new-color").value = alb.color;
            document.getElementById("title-album-form").innerText = "✏️ Editando Álbum";
        };

        window.removerAlbum = async function(id) {
            if (confirm("Deseja apagar este álbum do Firebase?")) {
                await set(ref(db, `albuns/${id}`), null);
            }
        };

        window.listarCartasCadastradasAdmin = function() {
            const filtro = document.getElementById("filter-cards-by-album").value;
            const list = document.getElementById("list-cards");
            const filtradas = filtro === "todos" ? cartas : cartas.filter(c => c.albumId === filtro);

            list.innerHTML = filtradas.map(c => {
                const albNome = albuns.find(a => a.id === c.albumId)?.title || "Sem álbum";
                return `
                    <div class="list-item">
                        <div><b>[${c.rarity.toUpperCase()}]</b> ${c.name} <br> <small style="color:#7c7c8a">${albNome} • 🪙${c.price} • ⚡${c.points}p</small></div>
                        <div class="box-acoes-botoes">
                            <button class="btn-edit" onclick="carregarCartaParaEdicao('${c.id}')">✏️</button>
                            <button class="btn-danger" style="padding:4px 8px; font-size:0.75rem;" onclick="removerCarta('${c.id}')">❌</button>
                        </div>
                    </div>
                `;
            }).join("");
        };

        window.salvarCarta = async function() {
            const editId = document.getElementById("card-edit-id").value;
            const albumId = document.getElementById("card-album-select").value;
            const rarity = document.getElementById("card-rarity").value;
            const name = document.getElementById("card-name").value.trim();
            const points = parseInt(document.getElementById("card-points").value) || 0;
            const price = parseInt(document.getElementById("card-price").value) || 0;
            const img = document.getElementById("card-img").value.trim();
            const desc = document.getElementById("card-desc").value.trim();

            if (!name) return alert("Diga o nome da figurinha!");

            const id = editId || "c-" + Date.now();
            await set(ref(db, `cartas/${id}`), { id, albumId, rarity, name, points, price, img, desc });

            document.getElementById("card-edit-id").value = "";
            document.getElementById("card-name").value = "";
            document.getElementById("card-points").value = "";
            document.getElementById("card-price").value = "";
            document.getElementById("card-img").value = "";
            document.getElementById("card-desc").value = "";
            document.getElementById("title-card-form").innerText = "🃏 Cadastrar Nova Figurinha";
        };

        window.carregarCartaParaEdicao = function(id) {
            const c = cartas.find(cart => cart.id === id);
            if (!c) return;
            document.getElementById("card-edit-id").value = c.id;
            document.getElementById("card-album-select").value = c.albumId;
            document.getElementById("card-rarity").value = c.rarity;
            document.getElementById("card-name").value = c.name;
            document.getElementById("card-points").value = c.points;
            document.getElementById("card-price").value = c.price;
            document.getElementById("card-img").value = c.img;
            document.getElementById("card-desc").value = c.desc;
            document.getElementById("title-card-form").innerText = "✏️ Editando Figurinha";
        };

        window.removerCarta = async function(id) {
            if (confirm("Remover esta figurinha do Firebase?")) {
                await set(ref(db, `cartas/${id}`), null);
            }
        };

        function filtrarAlunosDistribuicao() {
            const fGrade = document.getElementById("select-filter-grade").value;
            const fLetter = document.getElementById("select-filter-letter").value;
            const selectStudent = document.getElementById("select-dist-student");

            selectStudent.innerHTML = "";
            const filtrados = usuarios.filter(u => {
                if (u.role !== 'aluno') return false;
                return (fGrade === "todos" || u.grade === fGrade) && (fLetter === "todos" || u.letter === fLetter);
            });

            if (filtrados.length === 0) {
                selectStudent.innerHTML = `<option value="">Nenhum aluno encontrado</option>`;
                return;
            }
            filtrados.forEach(u => {
                selectStudent.innerHTML += `<option value="${u.id}">${u.name} (${u.grade} ${u.letter})</option>`;
            });
        }
        window.filtrarAlunosDistribuicao = filtrarAlunosDistribuicao;

        function atualizarSelectisFigurinhasDistribuicao() {
            const albFiltro = document.getElementById("select-dist-album-filter").value;
            const selectCard = document.getElementById("select-dist-card");
            selectCard.innerHTML = "";

            const filtradas = cartas.filter(c => c.albumId === albFiltro);
            if (filtradas.length === 0) {
                selectCard.innerHTML = `<option value="">Nenhuma figurinha nesse álbum</option>`;
                return;
            }
            filtradas.forEach(c => {
                selectCard.innerHTML += `<option value="${c.id}">${c.name} [${c.rarity}]</option>`;
            });
        }
        window.atualizarSelectFigurinhasDistribuicao = atualizarSelectisFigurinhasDistribuicao;

        window.distribuirCarta = async function() {
            const studentId = document.getElementById("select-dist-student").value;
            const cardId = document.getElementById("select-dist-card").value;

            if (!studentId || !cardId) return alert("Dados inválidos!");

            const novaQtd = (inventario[studentId]?.[cardId] || 0) + 1;
            await set(ref(db, `inventario/${studentId}/${cardId}`), novaQtd);
            alert("🚀 Figurinha adicionada ao aluno via Cloud!");
        };

        window.adicionarAluno = async function() {
            const name = document.getElementById("student-name").value.trim();
            const grade = document.getElementById("student-grade").value;
            const letter = document.getElementById("student-letter").value;
            const role = document.getElementById("student-role").value;
            const pin = document.getElementById("student-pin").value.trim();

            if (!name || !pin) return alert("Preencha o Nome e Código!");

            const id = "u-" + Date.now();
            await set(ref(db, `usuarios/${id}`), {
                id, name, grade, letter, role, pin, coins: role === 'aluno' ? 10 : 100
            });

            document.getElementById("student-name").value = "";
            document.getElementById("student-pin").value = "";
            alert(`👤 Cadastrado com sucesso no Firebase!`);
        };
    </script>
